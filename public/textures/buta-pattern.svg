<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <defs>
    <pattern id="butaRepeat" x="0" y="0" width="100" height="100" patternUnits="userSpaceOnUse">
      <!-- Buta/Paisley flame shape -->
      <g opacity="0.08" fill="none" stroke="#C9A84C" stroke-width="0.8">
        <!-- Main buta teardrop -->
        <path d="M50 85 C50 85, 30 60, 30 42 C30 20, 50 10, 50 10 C50 10, 70 20, 70 42 C70 60, 50 85, 50 85 Z"/>
        <!-- Inner flame curl -->
        <path d="M50 72 C50 72, 38 55, 38 43 C38 28, 50 22, 50 22 C50 22, 62 28, 62 43 C62 55, 50 72, 50 72 Z"/>
        <!-- Inner dot -->
        <circle cx="50" cy="45" r="3"/>
        <!-- Curl tail -->
        <path d="M50 85 C50 85, 42 90, 38 88 C34 86, 35 80, 40 78" stroke-linecap="round"/>
      </g>
      <!-- Small accent buta (rotated, offset) -->
      <g opacity="0.04" fill="none" stroke="#8B0000" stroke-width="0.6" transform="translate(75, 75) scale(0.4) rotate(45, 50, 50)">
        <path d="M50 85 C50 85, 30 60, 30 42 C30 20, 50 10, 50 10 C50 10, 70 20, 70 42 C70 60, 50 85, 50 85 Z"/>
        <circle cx="50" cy="45" r="3"/>
      </g>
      <!-- Geometric diamond accent -->
      <g opacity="0.05" fill="none" stroke="#C9A84C" stroke-width="0.5">
        <rect x="85" y="5" width="10" height="10" transform="rotate(45, 90, 10)"/>
        <rect x="5" y="85" width="8" height="8" transform="rotate(45, 9, 89)"/>
      </g>
      <!-- Dot grid -->
      <circle cx="0" cy="0" r="1" fill="#C9A84C" opacity="0.04"/>
      <circle cx="100" cy="0" r="1" fill="#C9A84C" opacity="0.04"/>
      <circle cx="0" cy="100" r="1" fill="#C9A84C" opacity="0.04"/>
      <circle cx="100" cy="100" r="1" fill="#C9A84C" opacity="0.04"/>
    </pattern>
  </defs>
  <rect width="200" height="200" fill="#131313"/>
  <rect width="200" height="200" fill="url(#butaRepeat)"/>
</svg>
